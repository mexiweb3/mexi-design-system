<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="'Inter', system-ui, sans-serif">
  <rect width="1200" height="900" fill="#0a0a0a"/>

  <text x="60" y="80" font-family="'Exo 2', sans-serif" font-weight="800" font-size="48" fill="#f5f5f5">Color System</text>
  <text x="60" y="112" font-weight="400" font-size="16" fill="#9ca3af">Mauricio Cruz Brand System · Shared tokens + theme overrides</text>

  <!-- BACKGROUND -->
  <text x="60" y="180" font-family="'Exo 2', sans-serif" font-weight="600" font-size="14" fill="#10b981" letter-spacing="2">&gt; BACKGROUND</text>
  <g transform="translate(60, 200)">
    <rect width="180" height="120" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="1"/>
    <text x="16" y="100" font-size="13" font-weight="600" fill="#f5f5f5">mexi-black</text>
    <text x="16" y="116" font-size="11" fill="#9ca3af">#0a0a0a</text>
  </g>
  <g transform="translate(252, 200)">
    <rect width="180" height="120" fill="#111111"/>
    <text x="16" y="100" font-size="13" font-weight="600" fill="#f5f5f5">mexi-dark</text>
    <text x="16" y="116" font-size="11" fill="#9ca3af">#111111</text>
  </g>
  <g transform="translate(444, 200)">
    <rect width="180" height="120" fill="#1a1a1a"/>
    <text x="16" y="100" font-size="13" font-weight="600" fill="#f5f5f5">mexi-gray</text>
    <text x="16" y="116" font-size="11" fill="#9ca3af">#1a1a1a</text>
  </g>
  <g transform="translate(636, 200)">
    <rect width="180" height="120" fill="#f5f5f5"/>
    <text x="16" y="100" font-size="13" font-weight="600" fill="#0a0a0a">cream (light mode)</text>
    <text x="16" y="116" font-size="11" fill="#525252">#f5f5f5</text>
  </g>

  <!-- ACCENTS -->
  <text x="60" y="380" font-family="'Exo 2', sans-serif" font-weight="600" font-size="14" fill="#10b981" letter-spacing="2">&gt; ACCENTS</text>
  <g transform="translate(60, 400)">
    <rect width="180" height="120" fill="#10b981"/>
    <text x="16" y="32" font-size="11" fill="#0a0a0a" font-weight="600">PRIMARY</text>
    <text x="16" y="100" font-size="13" font-weight="600" fill="#0a0a0a">emerald</text>
    <text x="16" y="116" font-size="11" fill="#0a0a0a" opacity="0.7">#10b981</text>
  </g>
  <g transform="translate(252, 400)">
    <rect width="180" height="120" fill="#6366f1"/>
    <text x="16" y="32" font-size="11" fill="#f5f5f5" font-weight="600">SECONDARY</text>
    <text x="16" y="100" font-size="13" font-weight="600" fill="#f5f5f5">indigo</text>
    <text x="16" y="116" font-size="11" fill="#f5f5f5" opacity="0.7">#6366f1</text>
  </g>
  <g transform="translate(444, 400)">
    <rect width="180" height="120" fill="#f59e0b"/>
    <text x="16" y="32" font-size="11" fill="#0a0a0a" font-weight="600">ALERT</text>
    <text x="16" y="100" font-size="13" font-weight="600" fill="#0a0a0a">amber</text>
    <text x="16" y="116" font-size="11" fill="#0a0a0a" opacity="0.7">#f59e0b</text>
  </g>
  <g transform="translate(636, 400)">
    <rect width="180" height="120" fill="#ef4444"/>
    <text x="16" y="32" font-size="11" fill="#f5f5f5" font-weight="600">DESTRUCTIVE</text>
    <text x="16" y="100" font-size="13" font-weight="600" fill="#f5f5f5">red</text>
    <text x="16" y="116" font-size="11" fill="#f5f5f5" opacity="0.7">#ef4444</text>
  </g>
  <g transform="translate(828, 400)">
    <rect width="180" height="120" fill="#34d399"/>
    <text x="16" y="32" font-size="11" fill="#0a0a0a" font-weight="600">PRIMARY HOVER</text>
    <text x="16" y="100" font-size="13" font-weight="600" fill="#0a0a0a">emerald-light</text>
    <text x="16" y="116" font-size="11" fill="#0a0a0a" opacity="0.7">#34d399</text>
  </g>

  <!-- TEXT -->
  <text x="60" y="580" font-family="'Exo 2', sans-serif" font-weight="600" font-size="14" fill="#10b981" letter-spacing="2">&gt; TEXT</text>
  <g transform="translate(60, 600)">
    <rect width="180" height="120" fill="#1a1a1a"/>
    <text x="16" y="40" font-size="14" font-weight="600" fill="#f5f5f5">Primary text Aa</text>
    <text x="16" y="100" font-size="11" fill="#9ca3af">#f5f5f5 / text-100</text>
  </g>
  <g transform="translate(252, 600)">
    <rect width="180" height="120" fill="#1a1a1a"/>
    <text x="16" y="40" font-size="14" font-weight="500" fill="#9ca3af">Secondary Aa</text>
    <text x="16" y="100" font-size="11" fill="#9ca3af">#9ca3af / text-400</text>
  </g>
  <g transform="translate(444, 600)">
    <rect width="180" height="120" fill="#1a1a1a"/>
    <text x="16" y="40" font-size="14" font-weight="400" fill="#6b7280">Tertiary Aa</text>
    <text x="16" y="100" font-size="11" fill="#9ca3af">#6b7280 / text-500</text>
  </g>
  <g transform="translate(636, 600)">
    <rect width="180" height="120" fill="#1a1a1a"/>
    <text x="16" y="40" font-size="14" font-weight="400" fill="#525252">Disabled Aa</text>
    <text x="16" y="100" font-size="11" fill="#9ca3af">#525252 / text-600</text>
  </g>

  <!-- THEME ACCENTS -->
  <text x="60" y="780" font-family="'Exo 2', sans-serif" font-weight="600" font-size="14" fill="#6366f1" letter-spacing="2">&gt; THEME OVERRIDES</text>
  <g transform="translate(60, 800)">
    <rect width="372" height="60" fill="#10b981"/>
    <text x="16" y="36" font-size="14" font-weight="600" fill="#0a0a0a">mexi.wtf · accent (full saturation)</text>
  </g>
  <g transform="translate(444, 800)">
    <rect width="372" height="60" fill="#1a1a1a" stroke="#10b981" stroke-width="1"/>
    <text x="16" y="36" font-size="14" font-weight="600" fill="#10b981">meximalist.com · accent (restrained, on dark)</text>
  </g>
</svg>
