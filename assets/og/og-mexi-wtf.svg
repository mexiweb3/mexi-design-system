<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- subtle grid -->
  <g stroke="#1a1a1a" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="530" x2="1200" y2="530"/>
  </g>

  <!-- prompt indicator -->
  <text x="80" y="80" font-family="'Exo 2', sans-serif" font-weight="600" font-size="14" fill="#10b981" letter-spacing="3">&gt; MEXI.WTF</text>

  <!-- handle -->
  <text x="80" y="240" font-family="'Exo 2', sans-serif" font-weight="800" font-size="92" fill="#10b981" letter-spacing="-2">@meximalist</text>

  <!-- tagline -->
  <text x="80" y="320" font-family="'Exo 2', sans-serif" font-weight="800" font-size="64" fill="#f5f5f5" letter-spacing="-1">construyendo con ia</text>
  <text x="80" y="392" font-family="'Exo 2', sans-serif" font-weight="800" font-size="64" fill="#f5f5f5" letter-spacing="-1">desde mexico</text>

  <!-- meta row -->
  <g transform="translate(80, 470)" font-family="'Inter', sans-serif" font-weight="500" font-size="18" fill="#9ca3af">
    <text>livestream diario</text>
    <text x="218">·</text>
    <text x="240">390+ eps</text>
    <text x="372">·</text>
    <text x="394">comunidad</text>
  </g>

  <!-- footer -->
  <text x="80" y="565" font-family="'Inter', sans-serif" font-weight="400" font-size="14" fill="#525252">mexi.wtf · @meximalist · builder hub</text>

  <!-- brand mark right side -->
  <g transform="translate(960, 230)">
    <text font-family="'Exo 2', sans-serif" font-weight="800" font-size="220" fill="#10b981" opacity="0.12">M</text>
    <rect x="148" y="-128" width="14" height="120" fill="#10b981" opacity="0.6"/>
  </g>
</svg>
